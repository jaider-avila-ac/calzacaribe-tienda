name: calzacaribe-tienda

services:
  tienda:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-http://localhost:5174}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-608123125346-9iad9jvkl49j9f3hj5piipolbkjm1h56.apps.googleusercontent.com}
    image: calzacaribe-tienda
    container_name: calzacaribe-tienda
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - default
      - coolify

networks:
  coolify:
    external: true
