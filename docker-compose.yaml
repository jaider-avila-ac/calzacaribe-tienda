name: calzacaribe-tienda

services:
  tienda:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-http://localhost:5174}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-354623240504-8vulj2rf7j1pa4q8tu2f021nctsuovi8.apps.googleusercontent.com}
    image: calzacaribe-tienda
    container_name: calzacaribe-tienda
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - default
      - coolify

networks:
  coolify:
    external: true
